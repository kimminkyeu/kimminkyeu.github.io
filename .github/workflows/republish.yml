# Trigger re-publish option for github action
# https://danielsaidi.com/blog/2022/05/11/schedule-github-pages-rebuild-with-github-actions

name: Republish

on:
  schedule:
    # cron:  m  h d m day-of-week
    - cron: '1 18 * * *' # Run at 6:01 pm every day.
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps: # https://docs.github.com/ko/rest/pages?apiVersion=2022-11-28
      - name: Trigger GitHub pages rebuild
        run: |
          curl --fail --request POST \
            --url  https://api.github.com/repos/kimminkyeu/kimminkyeu.github.io/pages/builds \
            --header "Authorization: Bearer $GH_USER_TOKEN"
        env:
          # You must create a personal token with repo access as GitHub does
          # not yet support server-to-server page builds.
          GH_USER_TOKEN: $
